<!-- Inline Suggested Users (compact row between posts) -->
<div class="inline-suggestions">
    <div class="inline-suggestions-header">
        <h4>People you might like</h4>
        <a href="{% url 'accounts:enhanced_community' %}">See all</a>
    </div>
    <div class="inline-suggestions-row">
        {% for member in suggested_users|slice:":3" %}
        <div class="inline-suggestion-card" data-username="{{ member.username }}">
            {% if member.avatar %}
            <img src="{{ member.avatar.url }}" alt="{{ member.username }}" class="suggestion-avatar">
            {% else %}
            <div class="suggestion-avatar-initials" style="background: hsl({{ member.id|add:100 }}, 45%, 50%);">
                {{ member.first_name|default:member.username|slice:":1"|upper }}
            </div>
            {% endif %}
            <div class="suggestion-info">
                <a href="{% url 'accounts:profile' member.username %}" class="suggestion-name">{{ member.get_full_name|default:member.username }}</a>
            </div>
            <button class="follow-btn-inline follow-suggested-btn" data-username="{{ member.username }}">Follow</button>
        </div>
        {% endfor %}
    </div>
</div>
