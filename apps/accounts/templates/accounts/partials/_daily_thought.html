{% if daily_thought %}
<div class="daily-thought-panel">
    <div class="daily-thought-orb" aria-hidden="true"></div>
    <div class="daily-thought-inner">
        <div class="daily-thought-eyebrow">
            <i class="fas fa-sun" aria-hidden="true"></i> Daily recovery thought
        </div>
        <p class="daily-thought-quote">&ldquo;{{ daily_thought.quote }}&rdquo;</p>
        {% if daily_thought.author_attribution %}
        <div class="daily-thought-attr">&mdash; {{ daily_thought.author_attribution }}</div>
        {% endif %}
        {% if daily_thought.reflection_prompt %}
        <span class="daily-thought-cta">
            <i class="far fa-comment-dots" aria-hidden="true"></i> {{ daily_thought.reflection_prompt }}
        </span>
        {% endif %}
    </div>
</div>
{% endif %}
